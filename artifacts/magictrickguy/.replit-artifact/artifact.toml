kind = "web"
previewPath = "/"
title = "MagicTrickGuy.com"
version = "1.0.0"
id = "artifacts/magictrickguy"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24814

[services.development]
run = "pnpm --filter @workspace/magictrickguy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/magictrickguy", "run", "build" ]
publicDir = "artifacts/magictrickguy/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24814"
BASE_PATH = "/"
